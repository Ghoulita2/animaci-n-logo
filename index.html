<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación FABRI-K Vectorial</title>
    <style>
        :root {
            --bg-color: #ffffff; /* Fondo de la web */
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Animación de caída de las letras */
        .letter {
            opacity: 0;
            transform: translateY(-60px);
            animation: dropLetter 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: var(--delay);
        }

        @keyframes dropLetter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animación de dibujo de la casa */
        .house-path {
            /* El valor 1500 cubre la longitud total de los trazados complejos */
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            animation: buildHouse 2s ease-in-out forwards;
            animation-delay: var(--delay);
        }

        @keyframes buildHouse {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
