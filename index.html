<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación FABRI-K</title>
    <style>
        /* Aquí defines tu paleta de colores de forma estricta */
        :root {
            --bg-color: #ffffff; /* Fondo blanco para que resalte el logo */
            --brand-color: #a0522d; /* El tono marrón de FABRI-K */
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 1. Animación de caída de las letras */
        .letter {
            opacity: 0;
            transform: translateY(-50px);
            animation: dropLetter 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: var(--delay);
        }

        @keyframes dropLetter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 2. Animación de construcción de la casa (La letra A) */
        .house-path {
            stroke-dasharray: var(--path-length);
            stroke-dashoffset: var(--path-length);
            animation: buildHouse 1s ease-in-out forwards;
            animation-delay: var(--delay);
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes buildHouse {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>

    <svg viewBox="0 0 500 200" width="100%" max-width="600px">
        
        <g fill="var(--brand-color)" font-family="Arial, sans-serif" font-weight="900" font-size="85">
            <text x="40" y="140" class="letter" style="--delay: 0.1s">F</text>
            <text x="210" y="140" class="letter" style="--delay: 0.5s">B</text>
            <text x="280" y="140" class="letter" style="--delay: 0.7s">R</text>
            <text x="345" y="140" class="letter" style="--delay: 0.9s">I</text>
            <text x="375" y="140" class="letter" style="--delay: 1.1s">-</text>
            <text x="415" y="140" class="letter" style="--delay: 1.3s">K</text>
        </g>
        
        <g transform="translate(105, 55)">
            <path d="M 45 0 L 0 85 L 90 85 Z" fill="transparent" stroke="var(--brand-color)" stroke-width="8" class="house-path" style="--path-length: 300; --delay: 1.5s"/>
            <path d="M 35 85 L 35 55 L 55 55 L 55 85" fill="transparent" stroke="var(--brand-color)" stroke-width="4" class="house-path" style="--path-length: 100; --delay: 2.0s"/>
            <rect x="15" y="55" width="10" height="10" fill="transparent" stroke="var(--brand-color)" stroke-width="3" class="house-path" style="--path-length: 40; --delay: 2.3s"/>
            <rect x="65" y="55" width="10" height="10" fill="transparent" stroke="var(--brand-color)" stroke-width="3" class="house-path" style="--path-length: 40; --delay: 2.5s"/>
            <path d="M 65 30 L 65 10 L 75 10 L 75 45" fill="transparent" stroke="var(--brand-color)" stroke-width="4" class="house-path" style="--path-length: 100; --delay: 2.7s"/>
        </g>

    </svg>

</body>
</html>
