<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo FABRI-K - Animación Corregida</title>
    <style>
        :root {
            --bg-color: #ffffff; 
            --brand-color: #a0522d; 
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .letter {
            opacity: 0;
            transform: translateY(-60px);
            animation: dropLetter 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: var(--delay);
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            font-size: 85px;
        }

        @keyframes dropLetter {
            to { opacity: 1; transform: translateY(0); }
        }

        .house-path {
            stroke-dasharray: var(--path-length);
            stroke-dashoffset: var(--path-length);
            animation: buildHouse 1s ease-in-out forwards;
            animation-delay: var(--delay);
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes buildHouse {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>

    <svg viewBox="0 0 600 200" width="100%" max-width="700px">
        
        <defs>
            <clipPath id="corte-triangulo">
                <path d="M 45 0 L 0 85 L 90 85 Z" />
            </clipPath>
        </defs>

        <g fill="var(--brand-color)">
            <text x="35" y="140" class="letter" style="--delay: 0.0s">F</text>
            <text x="215" y="140" class="letter" style="--delay: 0.4s">B</text>
            <text x="290" y="140" class="letter" style="--delay: 0.6s">R</text>
            <text x="355" y="140" class="letter" style="--delay: 0.8s">I</text>
            <text x="390" y="140" class="letter" style="--delay: 1.0s">-</text>
            <text x="435" y="140" class="letter" style="--delay: 1.2s">K</text>
        </g>
        
        <g transform="translate(110, 50)" fill="transparent" stroke="var(--brand-color)">
            
            <path d="M 45 0 L 0 85 L 90 85 Z" class="house-path" style="--path-length: 300; --delay: 1.5s; stroke-width: 6;"/>
            
            <g clip-path="url(#corte-triangulo)">
                <line x1="-10" y1="20" x2="100" y2="20" class="house-path" style="--path-length: 120; --delay: 2.0s; stroke-width: 2;"/>
                <line x1="-10" y1="35" x2="100" y2="35" class="house-path" style="--path-length: 120; --delay: 2.1s; stroke-width: 2;"/>
                <line x1="-10" y1="50" x2="100" y2="50" class="house-path" style="--path-length: 120; --delay: 2.2s; stroke-width: 2;"/>
                <line x1="-10" y1="65" x2="100" y2="65" class="house-path" style="--path-length: 120; --delay: 2.3s; stroke-width: 2;"/>
                <line x1="-10" y1="80" x2="100" y2="80" class="house-path" style="--path-length: 120; --delay: 2.4s; stroke-width: 2;"/>
            </g>
            
            <path d="M 35 85 L 35 55 L 55 55 L 55 85" class="house-path" style="--path-length: 100; --delay: 2.6s; stroke-width: 3;"/>
            <path d="M 43 70 L 47 70 L 45 66 Z" class="house-path" style="--path-length: 15; --delay: 2.8s; stroke-width: 2;"/>

            <g>
                <rect x="15" y="55" width="10" height="10" class="house-path" style="--path-length: 40; --delay: 3.0s; stroke-width: 2;"/>
                <line x1="20" y1="55" x2="20" y2="65" class="house-path" style="--path-length: 10; --delay: 3.1s;"/>
                <line x1="15" y1="60" x2="25" y2="60" class="house-path" style="--path-length: 10; --delay: 3.2s;"/>
                
                <rect x="65" y="55" width="10" height="10" class="house-path" style="--path-length: 40; --delay: 3.3s; stroke-width: 2;"/>
                <line x1="70" y1="55" x2="70" y2="65" class="house-path" style="--path-length: 10; --delay: 3.4s;"/>
                <line x1="65" y1="60" x2="75" y2="60" class="house-path" style="--path-length: 10; --delay: 3.5s;"/>
            </g>
            
            <path d="M 65 30 L 65 10 L 75 10 L 75 45" class="house-path" style="--path-length: 100; --delay: 3.7s; stroke-width: 3;"/>
        </g>
    </svg>
</body>
</html>
